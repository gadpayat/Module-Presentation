<title>Module Presentations</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    overflow-x:hidden;
    background:#000;
    color:white;
}

/* 3D Globe Background */
#earth-container{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-2;
}

/* Dark Overlay */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:
    linear-gradient(
        rgba(0,20,30,.35),
        rgba(0,0,0,.45)
    );
    z-index:-1;
}

/* Header */
header{
    text-align:center;
    padding:30px;
    background:rgba(0,0,0,.45);
    backdrop-filter:blur(10px);
}

header h1{
    font-size:2.5rem;
    color:#7dffb3;
}

header p{
    margin-top:10px;
    color:#e0e0e0;
}

/* Main Container */
.container{
    width:95%;
    max-width:1400px;
    margin:auto;
    padding:30px;
}

/* Main Buttons Grid */
.main-grid{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

/* Main Buttons */
.btn{
    background:rgba(0,100,60,.8);
    color:white;
    border:none;
    border-radius:15px;
    min-height:75px;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
    text-decoration:none;
    display:flex;
    align-items:center;
    justify-content:center;
    backdrop-filter:blur(5px);
}

.btn:hover{
    transform:translateY(-5px);
    background:#14a44d;
    box-shadow:
    0 0 25px rgba(0,255,120,.5);
}

/* Sub Menus */
.sub-container{
    display:none;
    margin-top:25px;
    background:rgba(255,255,255,.08);
    border-radius:20px;
    padding:25px;
    backdrop-filter:blur(10px);
}

.section-title{
    text-align:center;
    color:#9cffc4;
    margin-bottom:20px;
}

/* Dashboard Grid */
.sub-grid{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

.sub-btn{
    background:#0f6f3d;
    color:white;
    text-decoration:none;
    min-height:65px;
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
    transition:.3s;
    font-weight:bold;
}

.sub-btn:hover{
    background:#18b85f;
    transform:scale(1.03);
}

/* Footer */
footer{
    position:fixed;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:100%;
    text-align:center;
    padding:10px 20px;
    background:rgba(0,0,0,.5);
    backdrop-filter:blur(5px);
    z-index:1000;
}

</style>

<!-- THREE.JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

/* ---------- MENU ---------- */

function toggleMenu(id){

const menu=document.getElementById(id);

if(menu.style.display==="block"){
    menu.style.display="none";
}else{
    menu.style.display="block";
}

}

/* ---------- 3D EARTH ---------- */

const scene = new THREE.Scene();

const camera =
new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.z = 3.5;

const renderer =
new THREE.WebGLRenderer({
antialias:true,
alpha:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

document
.getElementById("earth-container")
.appendChild(renderer.domElement);

/* Stars */

const starsGeometry =
new THREE.BufferGeometry();

const starsVertices = [];

for(let i=0;i<15000;i++){

const x=(Math.random()-0.5)*3000;
const y=(Math.random()-0.5)*3000;
const z=(Math.random()-0.5)*3000;

starsVertices.push(x,y,z);

}

starsGeometry.setAttribute(
'position',
new THREE.Float32BufferAttribute(
starsVertices,3
)
);

const starsMaterial =
new THREE.PointsMaterial({
size:1.2
});

const starField =
new THREE.Points(
starsGeometry,
starsMaterial
);

scene.add(starField);

/* Texture Loader */

const loader =
new THREE.TextureLoader();

/* Earth */

const earthGeometry =
new THREE.SphereGeometry(
1,
64,
64
);

const earthMaterial =
new THREE.MeshPhongMaterial({
map:loader.load(
'https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg'
)
});

const earth =
new THREE.Mesh(
earthGeometry,
earthMaterial
);

scene.add(earth);

/* Clouds */

const cloudGeometry =
new THREE.SphereGeometry(
1.015,
64,
64
);

const cloudMaterial =
new THREE.MeshPhongMaterial({
map:loader.load(
'https://raw.githubusercontent.com/turban/webgl-earth/master/images/fair_clouds_4k.png'
),
transparent:true,
opacity:0.45
});

const clouds =
new THREE.Mesh(
cloudGeometry,
cloudMaterial
);

scene.add(clouds);

/* Atmosphere Glow */

const glowGeometry =
new THREE.SphereGeometry(
1.08,
64,
64
);

const glowMaterial =
new THREE.MeshBasicMaterial({
color:0x4fc3ff,
transparent:true,
opacity:0.15
});

const glow =
new THREE.Mesh(
glowGeometry,
glowMaterial
);

scene.add(glow);

/* Lighting */

const ambient =
new THREE.AmbientLight(
0xffffff,
0.8
);

scene.add(ambient);

const sun =
new THREE.DirectionalLight(
0xffffff,
1.5
);

sun.position.set(
5,
3,
5
);

scene.add(sun);

/* Animation */

function animate(){

requestAnimationFrame(
animate
);

earth.rotation.y += 0.0015;

clouds.rotation.y += 0.0025;

starField.rotation.y += 0.0001;

renderer.render(
scene,
camera
);

}

animate();

/* Resize */

window.addEventListener(
'resize',
()=>{

camera.aspect =
window.innerWidth /
window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

}
);

</script>
